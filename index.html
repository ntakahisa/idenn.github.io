<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>等速円運動 WebAR教材（スキャンガイド付）</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            user-select: none;
        }

        /* 画面中央の「マーカー読み取り枠」UI */
        #scan-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 260px;
            height: 260px;
            border: 4px dashed #00d2d3;
            border-radius: 20px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4); /* 周りを暗くして枠を強調 */
            z-index: 5;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 20px;
            box-sizing: border-box;
            transition: opacity 0.5s ease; /* フェードアウト用 */
        }
        #scan-text {
            color: #00d2d3;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 6px 12px;
            border-radius: 20px;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        /* 数値表示パネル */
        #data-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
            line-height: 1.6;
            font-family: monospace;
        }
        .text-orange { color: #ff9f43; }
        .text-cyan { color: #00d2d3; }
        .text-red { color: #ff6b6b; }

        /* 操作パネル */
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 10;
            box-sizing: border-box;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background-color: #007bff;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }
        button:active {
            background-color: #0056b3;
        }
        .slider-group {
            margin-bottom: 8px;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #333;
        }
        input[type="range"] {
            width: 100%;
            height: 6px;
        }
    </style>
</head>
<body>

    <div id="scan-guide">
        <div id="scan-text">Hiroマーカーをこの枠内に収めてください</div>
    </div>

    <div id="data-panel">
        <div>半径 r : <span id="val-r" class="text-orange">1.00</span> m</div>
        <div>角速度 ω : <span id="val-omega" class="text-orange">1.50</span> rad/s</div>
        <div>速度 v : <span id="val-v" class="text-cyan">1.50</span> m/s</div>
        <div>向心加速度 a_c : <span id="val-ac" class="text-red">2.25</span> m/s²</div>
        <div>周期 T : <span id="val-t">4.19</span> s</div>
    </div>

    <div id="ui-container">
        <div class="btn-group">
            <button id="btn-play-pause">一時停止</button>
            <button id="btn-reset">最初から</button>
        </div>
        <div class="slider-group">
            <div class="slider-label">
                <span>半径 r (m)</span>
                <span id="label-r">1.00</span>
            </div>
            <input type="range" id="slider-r" min="0.2" max="2.0" step="0.1" value="1.0">
        </div>
        <div class="slider-group">
            <div class="slider-label">
                <span>角速度 ω (rad/s)</span>
                <span id="label-omega">1.50</span>
            </div>
            <input type="range" id="slider-omega" min="0.5" max="4.0" step="0.1" value="1.5">
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_matrix; matrixCodeType: 3x3;">
        
        <a-marker id="ar-marker" type="pattern" url="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/data/patt.hiro">
            
            <a-entity position="0 0.1 0">
                
                <a-grid attributes-to-copy="grid" static-body material="opacity: 0.15; gridColor: #ffffff"></a-grid>

                <a-ring id="orbit" color="#ffffff" rotation="-90 0 0" radius-inner="0.98" radius-outer="1.02" opacity="0.7"></a-ring>

                <a-entity id="rotator" rotation="0 0 0">
                    
                    <a-sphere id="ball" position="1 0 0" radius="0.08" color="#ffffff"></a-sphere>

                    <a-entity id="container-r">
                        <a-cylinder id="vec-r" color="#ff9f43" radius="0.015" rotation="0 0 90"></a-cylinder>
                    </a-entity>

                    <a-entity id="container-v">
                        <a-cylinder id="vec-v" color="#00d2d3" radius="0.015" rotation="90 0 0"></a-cylinder>
                    </a-entity>

                    <a-entity id="container-a">
                        <a-cylinder id="vec-a" color="#ff6b6b" radius="0.015" rotation="0 0 90"></a-cylinder>
                    </a-entity>
                    
                </a-entity>
            </a-entity>

        </a-marker>
        
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // --- 物理パラメータ ---
        let r = 1.0;
        let omega = 1.5;
        let theta = 0;
        let isPlaying = true;

        // --- DOM要素 ---
        const scanGuide = document.getElementById('scan-guide');
        const arMarker = document.getElementById('ar-marker');

        const sliderR = document.getElementById('slider-r');
        const sliderOmega = document.getElementById('slider-omega');
        const labelR = document.getElementById('label-r');
        const labelOmega = document.getElementById('label-omega');
        
        const valR = document.getElementById('val-r');
        const valOmega = document.getElementById('val-omega');
        const valV = document.getElementById('val-v');
        const valAc = document.getElementById('val-ac');
        const valT = document.getElementById('val-t');

        const btnPlayPause = document.getElementById('btn-play-pause');
        const btnReset = document.getElementById('btn-reset');

        // --- 3D要素 ---
        const orbit = document.getElementById('orbit');
        const rotator = document.getElementById('rotator');
        const ball = document.getElementById('ball');
        
        const vecR = document.getElementById('vec-r');
        const vecV = document.getElementById('vec-v');
        const vecA = document.getElementById('vec-a');
        
        const containerR = document.getElementById('container-r');
        const containerV = document.getElementById('container-v');
        const containerA = document.getElementById('container-a');

        const scaleFactor = 0.35; // ベクトルの大きさ調整用

        // --- マーカー検知時のUI表示切り替え ---
        // マーカーが見つかったら読み取り枠をスッと消す
        arMarker.addEventListener('markerFound', () => {
            scanGuide.style.opacity = '0';
        });

        // マーカーを見失ったら読み取り枠を再度表示する
        arMarker.addEventListener('markerLost', () => {
            scanGuide.style.opacity = '1';
        });

        // --- 物理演算・3Dモデル更新 ---
        function updatePhysics() {
            const v = r * omega;
            const ac = r * omega * omega;
            const T = (2 * Math.PI) / omega;

            // パネル数値更新
            valR.textContent = r.toFixed(2);
            valOmega.textContent = omega.toFixed(2);
            valV.textContent = v.toFixed(2);
            valAc.textContent = ac.toFixed(2);
            valT.textContent = T.toFixed(2);

            labelR.textContent = r.toFixed(2);
            labelOmega.textContent = omega.toFixed(2);

            // 3Dモデル更新
            orbit.setAttribute('radius-inner', (r - 0.02).toFixed(3));
            orbit.setAttribute('radius-outer', (r + 0.02).toFixed(3));
            ball.setAttribute('position', `${r} 0 0`);

            // 半径ベクトル
            vecR.setAttribute('height', r);
            containerR.setAttribute('position', `${r / 2} 0 0`);

            // 速度ベクトル
            const vLen = Math.max(v * scaleFactor, 0.05);
            vecV.setAttribute('height', vLen);
            containerV.setAttribute('position', `${r} 0 ${-vLen / 2}`);

            // 向心加速度ベクトル
            const aLen = Math.max(ac * scaleFactor, 0.05);
            vecA.setAttribute('height', aLen);
            containerA.setAttribute('position', `${r - (aLen / 2)} 0 0`);
        }

        // --- イベントリスナー設定 ---
        sliderR.addEventListener('input', (e) => {
            r = parseFloat(e.target.value);
            updatePhysics();
        });

        sliderOmega.addEventListener('input', (e) => {
            omega = parseFloat(e.target.value);
            updatePhysics();
        });

        btnPlayPause.addEventListener('click', () => {
            isPlaying = !isPlaying;
            btnPlayPause.textContent = isPlaying ? "一時停止" : "再生";
        });

        btnReset.addEventListener('click', () => {
            theta = 0;
            rotator.setAttribute('rotation', '0 0 0');
            if (!isPlaying) {
                isPlaying = true;
                btnPlayPause.textContent = "一時停止";
            }
        });

        // --- アニメーションループ ---
        let lastTime = 0;
        function animate(time) {
            requestAnimationFrame(animate);

            if (!lastTime) lastTime = time;
            const dt = (time - lastTime) / 1000;
            lastTime = time;

            if (isPlaying) {
                theta += omega * dt;
                const degree = (theta * 180 / Math.PI) % 360;
                rotator.setAttribute('rotation', `0 ${degree} 0`);
            }
        }

        // 初期化実行
        updatePhysics();
        requestAnimationFrame(animate);
    </script>
</body>
</html>
