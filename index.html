<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>等速円運動 WebAR教材</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            user-select: none;
        }
        /* ARコントロールUI層 */
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10;
            box-sizing: border-box;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            background-color: #007bff;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        button:active {
            background-color: #0056b3;
        }
        .slider-group {
            margin-bottom: 8px;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        input[type="range"] {
            width: 100%;
        }
        /* 数値表示パネル */
        #data-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 10;
            pointer-events: none;
            line-height: 1.5;
        }
        .text-orange { color: #ff9f43; }
        .text-cyan { color: #00d2d3; }
        .text-red { color: #ff6b6b; }
    </style>
</head>
<body>

    <div id="data-panel">
        <div>半径 r : <span id="val-r" class="text-orange">1.00</span> m</div>
        <div>角速度 ω : <span id="val-omega" class="text-orange">1.50</span> rad/s</div>
        <div>速度 v : <span id="val-v" class="text-cyan">1.50</span> m/s</div>
        <div>向心加速度 a_c : <span id="val-ac" class="text-red">2.25</span> m/s²</div>
        <div>周期 T : <span id="val-t">4.19</span> s</div>
    </div>

    <div id="ui-container">
        <div class="btn-group">
            <button id="btn-play-pause">一時停止</button>
            <button id="btn-reset">最初から</button>
        </div>
        <div class="slider-group">
            <div class="slider-label">
                <span>半径 r (m)</span>
                <span id="label-r">1.00</span>
            </div>
            <input type="range" id="slider-r" min="0.2" max="2.0" step="0.1" value="1.0">
        </div>
        <div class="slider-group">
            <div class="slider-label">
                <span>角速度 ω (rad/s)</span>
                <span id="label-omega">1.50</span>
            </div>
            <input type="range" id="slider-omega" min="0.5" max="4.0" step="0.1" value="1.5">
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-marker preset="hiro">
            
            <a-entity line="start: -1.5 0 0; end: 1.5 0 0; color: #7f8c8d"></a-entity>
            <a-entity line="start: 0 0 -1.5; end: 0 0 1.5; color: #7f8c8d"></a-entity>

            <a-ring id="orbit" color="#ffffff" rotation="-90 0 0" radius-inner="0.99" radius-outer="1.01" opacity="0.6"></a-ring>

            <a-entity id="rotator" rotation="0 0 0">
                <a-sphere id="ball" position="1 0 0" radius="0.08" color="#f5f6fa"></a-sphere>

                <a-entity id="radius-vector" line="start: 0 0 0; end: 1 0 0; color: #ff9f43"></a-entity>

                <a-entity id="velocity-vector" position="1 0 0" line="start: 0 0 0; end: 0 0 -0.5; color: #00d2d3"></a-entity>

                <a-entity id="acceleration-vector" position="1 0 0" line="start: 0 0 0; end: -0.5 0 0; color: #ff6b6b"></a-entity>
            </a-entity>

        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // --- 物理パラメータと制御用変数 ---
        let r = 1.0;      // 半径 (m)
        let omega = 1.5;  // 角速度 (rad/s)
        let theta = 0;    // 現在の角度 (rad)
        let isPlaying = true;

        // DOM要素の取得
        const sliderR = document.getElementById('slider-r');
        const sliderOmega = document.getElementById('slider-omega');
        const labelR = document.getElementById('label-r');
        const labelOmega = document.getElementById('label-omega');
        
        const valR = document.getElementById('val-r');
        const valOmega = document.getElementById('val-omega');
        const valV = document.getElementById('val-v');
        const valAc = document.getElementById('val-ac');
        const valT = document.getElementById('val-t');

        const btnPlayPause = document.getElementById('btn-play-pause');
        const btnReset = document.getElementById('btn-reset');

        // 3D要素の取得
        const orbit = document.getElementById('orbit');
        const rotator = document.getElementById('rotator');
        const ball = document.getElementById('ball');
        const radiusVector = document.getElementById('radius-vector');
        const velocityVector = document.getElementById('velocity-vector');
        const accelerationVector = document.getElementById('acceleration-vector');

        // --- パラメータ計算 & UI/3Dの更新処理 ---
        function updatePhysics() {
            // 計算
            const v = r * omega; // 速度
            const ac = r * omega * omega; // 向心加速度
            const T = (2 * Math.PI) / omega; // 周期

            // UI数値の更新 (小数点2桁)
            valR.textContent = r.toFixed(2);
            valOmega.textContent = omega.toFixed(2);
            valV.textContent = v.toFixed(2);
            valAc.textContent = ac.toFixed(2);
            valT.textContent = T.toFixed(2);

            labelR.textContent = r.toFixed(2);
            labelOmega.textContent = omega.toFixed(2);

            // 3Dオブジェクトの調整
            // 1. 軌道円の半径調整
            orbit.setAttribute('radius-inner', (r - 0.01).toFixed(3));
            orbit.setAttribute('radius-outer', (r + 0.01).toFixed(3));

            // 2. 小球の位置調整
            ball.setAttribute('position', `${r} 0 0`);

            // 3. 半径ベクトルの長さ調整
            radiusVector.setAttribute('line', `start: 0 0 0; end: ${r} 0 0; color: #ff9f43`);

            // 4. ベクトル描画用のスケーリング（物理値そのままだと大きすぎるため1/3程度に視覚調整）
            const scaleFactor = 0.35; 
            const vLength = v * scaleFactor;
            const acLength = ac * scaleFactor;

            // 5. 速度ベクトル（小球のローカル座標でZのマイナス方向が接線方向になります）
            velocityVector.setAttribute('position', `${r} 0 0`);
            velocityVector.setAttribute('line', `start: 0 0 0; end: 0 0 ${-vLength}; color: #00d2d3`);

            // 6. 向心加速度ベクトル（小球のローカル座標でXのマイナス方向が中心方向になります）
            accelerationVector.setAttribute('position', `${r} 0 0`);
            accelerationVector.setAttribute('line', `start: 0 0 0; end: ${-acLength} 0 0; color: #ff6b6b`);
        }

        // --- スライダーイベント ---
        sliderR.addEventListener('input', (e) => {
            r = parseFloat(e.target.value);
            updatePhysics();
        });

        sliderOmega.addEventListener('input', (e) => {
            omega = parseFloat(e.target.value);
            updatePhysics();
        });

        // --- 再生・停止・リセット制御 ---
        btnPlayPause.addEventListener('click', () => {
            isPlaying = !isPlaying;
            btnPlayPause.textContent = isPlaying ? "一時停止" : "再生";
        });

        btnReset.addEventListener('click', () => {
            theta = 0;
            rotator.setAttribute('rotation', '0 0 0');
            if (!isPlaying) {
                isPlaying = true;
                btnPlayPause.textContent = "一時停止";
            }
        });

        // --- 描画ループ (等速円運動のアニメーション) ---
        let lastTime = 0;
        function animate(time) {
            requestAnimationFrame(animate);

            if (!lastTime) lastTime = time;
            const dt = (time - lastTime) / 1000; // 秒換算
            lastTime = time;

            if (isPlaying) {
                // 角度を更新 (dTheta = omega * dt)
                theta += omega * dt;
                
                // A-Frameの回転は度（degree）表記なので変換して適用
                const degree = (theta * 180 / Math.PI) % 360;
                rotator.setAttribute('rotation', `0 ${degree} 0`);
            }
        }

        // 初期化
        updatePhysics();
        requestAnimationFrame(animate);

    </script>
</body>
</html>
