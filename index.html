<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>等速円運動 空間完全固定AR教材</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            user-select: none;
            background-color: transparent; 
        }

        /* 【新機能】縦画面のときに表示する横画面誘導オーバーレイ */
        #rotate-alert {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.95);
            color: white;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-weight: bold;
            padding: 20px;
            box-sizing: border-box;
        }

        #rotate-alert .icon {
            font-size: 50px;
            margin-bottom: 15px;
            animation: rotate-anim 2s infinite ease-in-out;
        }

        @keyframes rotate-anim {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(-90deg); }
        }

        /* 縦向き（Portrait）のときだけオーバーレイを表示 */
        @media screen and (orientation: portrait) {
            #rotate-alert {
                display: flex;
            }
        }

        /* 状態案内UI */
        #status-alert {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 123, 255, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: bold;
            z-index: 100;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            pointer-events: none;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .status-locked {
            background: rgba(40, 167, 69, 0.95) !important;
        }

        /* 数値表示パネル（右上） */
        #data-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 90;
            pointer-events: none;
            line-height: 1.6;
            font-family: monospace;
            width: 170px;
        }
        .text-orange { color: #ff9f43; font-weight: bold; }
        .text-cyan { color: #00d2d3; font-weight: bold; }
        .text-red { color: #ff6b6b; font-weight: bold; }

        /* 左側操作チェックボックス */
        #view-controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px;
            border-radius: 8px;
            z-index: 90;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .control-item {
            display: flex;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
        }
        .control-item input {
            margin-right: 6px;
            width: 14px;
            height: 14px;
        }

        /* 下部メインコントロールUI */
        #bottom-ui {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            z-index: 90;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            max-height: 500px;
            overflow: hidden;
        }

        /* 折りたたみ用ヘッダーエリア */
        #ui-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }

        #ui-title-text {
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }

        /* 折りたたみ切り替えボタン */
        #btn-collapse {
            background: #e2e8f0;
            color: #4a5568;
            border: none;
            padding: 4px 12px;
            font-size: 11px;
            border-radius: 15px;
            cursor: pointer;
            width: auto;
            flex: none;
            font-weight: bold;
            transition: all 0.2s;
        }
        #btn-collapse:hover {
            background: #cbd5e1;
        }

        /* コンテンツ部分（開閉対象、横向きで最も美しく配置される2カラム） */
        #ui-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            transition: opacity 0.2s ease;
            opacity: 1;
        }

        /* 折りたたまれた状態のスタイル */
        #bottom-ui.collapsed {
            padding: 10px 15px;
            max-height: 50px;
        }
        #bottom-ui.collapsed #ui-header {
            margin-bottom: 0;
            border-bottom: none;
            padding-bottom: 0;
        }
        #bottom-ui.collapsed #ui-content {
            opacity: 0;
            pointer-events: none;
        }

        .panel-title {
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            background: #007bff;
            padding: 3px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 8px;
        }

        .slider-container {
            margin-bottom: 8px;
        }
        .slider-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: bold;
            color: #333;
            margin-bottom: 2px;
        }
        input[type="range"] {
            width: 100%;
            height: 5px;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            background: #007bff;
            color: white;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
        }
        button:active { background: #0056b3; }

        /* グラフ描画エリア */
        .graph-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .graph-canvas-wrapper {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 6px;
            height: 90px;
        }
        canvas {
            width: 100%;
            height: 100%;
        }

        a-scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="rotate-alert">
        <div class="icon">🔄</div>
        <div style="font-size: 18px; margin-bottom: 8px;">画面を横向きにしてください</div>
        <div style="font-size: 12px; color: #94a3b8; line-height: 1.5;">
            このAR教材は、端末を横向きにすることで<br>実験操作パネルと3D空間を最適に表示します。
        </div>
    </div>

    <div id="status-alert">📷 現実の机に向けて画面をタップし、円運動の中心軸をその場に完全固定</div>

    <div id="view-controls">
        <label class="control-item"><input type="checkbox" id="chk-r" checked> 半径ベクトル (橙)</label>
        <label class="control-item"><input type="checkbox" id="chk-v" checked> 速度ベクトル (青・実線)</label>
        <label class="control-item"><input type="checkbox" id="chk-a" checked> 向心加速度 (赤・破線)</label>
        <label class="control-item"><input type="checkbox" id="chk-trace" checked> 運動の軌跡（光）</label>
    </div>

    <div id="data-panel">
        <div>半径 r: <span id="val-r" class="text-orange">1.00</span> m</div>
        <div>角速度 ω: <span id="val-omega" class="text-orange">2.00</span> rad/s</div>
        <div>速度 v: <span id="val-v" class="text-cyan">2.00</span> m/s</div>
        <div>向心加速度 a_c: <span id="val-ac" class="text-red">4.00</span> m/s²</div>
        <div>周期 T: <span id="val-t">3.14</span> s</div>
    </div>

    <div id="bottom-ui">
        <div id="ui-header">
            <span id="ui-title-text">📊 実験コントロール</span>
            <button id="btn-collapse">閉じる ▲</button>
        </div>

        <div id="ui-content">
            <div>
                <span class="panel-title">パラメータ調整</span>
                <div class="slider-container">
                    <div class="slider-meta"><span>半径 r (m)</span><span id="lbl-r">1.00</span></div>
                    <input type="range" id="sld-r" min="0.5" max="2.0" step="0.05" value="1.00">
                </div>
                <div class="slider-container">
                    <div class="slider-meta"><span>角速度 ω (rad/s)</span><span id="lbl-omega">2.00</span></div>
                    <input type="range" id="sld-omega" min="0.5" max="4.0" step="0.05" value="2.00">
                </div>
                <div class="btn-row">
                    <button id="btn-toggle">一時停止</button>
                    <button id="btn-clear">最初から</button>
                </div>
            </div>

            <div class="graph-box">
                <span class="panel-title">グラフ (リアルタイム変位 x)</span>
                <div class="graph-canvas-wrapper">
                    <canvas id="graphCanvas"></canvas>
                </div>
            </div>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="alpha: true; antialias: true;" vr-mode-ui="enabled: false">
        
        <a-entity id="ar-world" position="0 -0.5 -1.5">
            
            <a-cylinder radius="0.015" height="0.3" color="#64748b" position="0 0 0"></a-cylinder>
            
            <a-ring id="orbit-ring" color="#ffffff" rotation="-90 0 0" radius-inner="0.99" radius-outer="1.01" opacity="0.8"></a-ring>

            <a-entity id="trail-container"></a-entity>

            <a-entity id="rotator" rotation="0 0 0">
                
                <a-sphere id="physics-ball" position="1 0 0" radius="0.06" color="#ffffff"></a-sphere>

                <a-entity id="group-v-r">
                    <a-cylinder color="#ff9f43" radius="0.01" height="1" rotation="0 0 90" position="0.5 0 0"></a-cylinder>
                </a-entity>

                <a-entity id="group-v-v" position="1 0 0">
                    <a-cone color="#00d2d3" radius-bottom="0.025" radius-top="0" height="0.12" rotation="90 0 0" position="0 0 -0.4"></a-cone>
                    <a-cylinder color="#00d2d3" radius="0.008" height="0.4" rotation="90 0 0" position="0 0 -0.2"></a-cylinder>
                    <a-text value="v" color="#00d2d3" scale="0.35 0.35 0.35" position="0 0.12 -0.25" rotation="-30 0 0"></a-text>
                </a-entity>

                <a-entity id="group-v-a" position="1 0 0">
                    <a-cone color="#ff6b6b" radius-bottom="0.025" radius-top="0" height="0.12" rotation="0 0 90" position="-0.4 0 0"></a-cone>
                    <a-cylinder color="#ff6b6b" radius="0.008" height="0.1" rotation="0 0 90" position="-0.08 0 0"></a-cylinder>
                    <a-cylinder color="#ff6b6b" radius="0.008" height="0.1" rotation="0 0 90" position="-0.26 0 0"></a-cylinder>
                    <a-text value="a_c" color="#ff6b6b" scale="0.35 0.35 0.35" position="-0.25 0.12 0" rotation="-30 0 0"></a-text>
                </a-entity>

            </a-entity>
        </a-entity>

        <a-entity id="main-camera" camera></a-entity>
    </a-scene>

    <script>
        let isLocked = false;
        let r = 1.00;
        let omega = 2.00;
        let theta = 0;
        let isPlaying = true;
        let showR = true, showV = true, showA = true, showTrace = true;
        
        const xHistory = [];
        const maxHistoryLen = 120;

        // トラッキング用ジャイロ制御変数
        const lockedCameraRotation = new THREE.Euler();
        const lockedCameraPosition = new THREE.Vector3();
        const currentDeviceRotation = new THREE.Euler(0, 0, 0, 'YXZ');

        // UI関係DOM
        const bottomUi = document.getElementById('bottom-ui');
        const btnCollapse = document.getElementById('btn-collapse');

        const sldR = document.getElementById('sld-r');
        const sldOmega = document.getElementById('sld-omega');
        const lblR = document.getElementById('lbl-r');
        const lblOmega = document.getElementById('lbl-omega');
        const valR = document.getElementById('val-r');
        const valOmega = document.getElementById('val-omega');
        const valV = document.getElementById('val-v');
        const valAc = document.getElementById('val-ac');
        const valT = document.getElementById('val-t');
        const btnToggle = document.getElementById('btn-toggle');
        const btnClear = document.getElementById('btn-clear');
        const statusAlert = document.getElementById('status-alert');
        const chkR = document.getElementById('chk-r');
        const chkV = document.getElementById('chk-v');
        const chkA = document.getElementById('chk-a');
        const chkTrace = document.getElementById('chk-trace');

        // 3DオブジェクトDOM
        const arWorld = document.getElementById('ar-world');
        const rotator = document.getElementById('rotator');
        const ball = document.getElementById('physics-ball');
        const orbitRing = document.getElementById('orbit-ring');
        const trailContainer = document.getElementById('trail-container');
        const gR = document.getElementById('group-v-r');
        const gV = document.getElementById('group-v-v');
        const gA = document.getElementById('group-v-a');
        const mainCamera = document.getElementById('main-camera');

        // Canvas初期化
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- 折りたたみ（縮小）制御イベント ---
        btnCollapse.addEventListener('click', () => {
            bottomUi.classList.toggle('collapsed');
            
            if (bottomUi.classList.contains('collapsed')) {
                btnCollapse.textContent = '開く ▼';
            } else {
                btnCollapse.textContent = '閉じる ▲';
                // 開いた瞬間にキャンバスサイズを再計算
                setTimeout(resizeCanvas, 310); 
            }
        });

        // スマホのジャイロセンサー情報のリアルタイム受信処理
        window.addEventListener('deviceorientation', (event) => {
            if (event.alpha !== null && event.beta !== null && event.gamma !== null) {
                // 通常のオイラー角マッピングに戻して計算を安定化
                const alphaRad = THREE.MathUtils.degToRad(event.alpha);
                const betaRad = THREE.MathUtils.degToRad(event.beta);
                const gammaRad = THREE.MathUtils.degToRad(event.gamma);
                
                currentDeviceRotation.set(betaRad, alphaRad, -gammaRad);
            }
        }, true);

        // --- タップによる「現実空間への完全固定＆解除」ロジック ---
        window.addEventListener('click', (e) => {
            if (e.target.closest('#bottom-ui') || e.target.closest('#data-panel') || e.target.closest('#view-controls')) return;

            // iOS用センサー解放トリガー
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().catch(err => console.error(err));
            }

            if (!isLocked) {
                lockedCameraRotation.copy(currentDeviceRotation);
                lockedCameraPosition.set(0, 0, 0);

                arWorld.setAttribute('position', '0 -0.5 -1.4');
                
                isLocked = true;
                statusAlert.textContent = "📌 回転中心を完全固定しました！スマホを動かして近づいてみましょう (再タップで解除)";
                statusAlert.classList.add('status-locked');
            } else {
                isLocked = false;
                statusAlert.textContent = "📷 現実の机に向けて画面をタップし、円運動の中心軸を固定";
                statusAlert.classList.remove('status-locked');
            }
        });

        // 毎フレーム走る、独自のカメラ・ワールド同期演算ループ
        function updateCameraTracking() {
            const cameraObj = mainCamera.object3D;

            if (!isLocked) {
                cameraObj.quaternion.setFromEuler(currentDeviceRotation);
                arWorld.setAttribute('position', '0 -0.5 -1.4');
                arWorld.setAttribute('rotation', '0 0 0');
            } else {
                const diffRotation = new THREE.Quaternion();
                const currentQ = new THREE.Quaternion().setFromEuler(currentDeviceRotation);
                const lockedQ = new THREE.Quaternion().setFromEuler(lockedCameraRotation).invert();
                
                diffRotation.multiplyQuaternions(currentQ, lockedQ);
                cameraObj.quaternion.copy(currentDeviceRotation);

                const baseWorldPos = new THREE.Vector3(0, -0.5, -1.4);
                baseWorldPos.applyQuaternion(diffRotation);
                arWorld.object3D.position.copy(baseWorldPos);
            }
        }

        // --- 物理パラメータとベクトルのリアルタイム伸縮ロジック ---
        function updatePhysics() {
            const v = r * omega;
            const ac = r * omega * omega;
            const T = (2 * Math.PI) / omega;

            valR.textContent = r.toFixed(2);
            valOmega.textContent = omega.toFixed(2);
            valV.textContent = v.toFixed(2);
            valAc.textContent = ac.toFixed(2);
            valT.textContent = T.toFixed(2);

            lblR.textContent = r.toFixed(2);
            lblOmega.textContent = omega.toFixed(2);

            ball.setAttribute('position', `${r} 0 0`);
            orbitRing.setAttribute('radius-inner', (r - 0.01).toFixed(3));
            orbitRing.setAttribute('radius-outer', (r + 0.01).toFixed(3));
            
            gR.querySelector('a-cylinder').setAttribute('height', r);
            gR.querySelector('a-cylinder').setAttribute('position', `${r / 2} 0 0`);

            // 速度ベクトル
            gV.setAttribute('position', `${r} 0 0`);
            const vLength = Math.max(v * 0.2, 0.15);
            gV.querySelector('a-cylinder').setAttribute('height', vLength);
            gV.querySelector('a-cylinder').setAttribute('position', `0 0 ${-vLength / 2}`);
            gV.querySelector('a-cone').setAttribute('position', `0 0 ${-vLength}`);

            // 向心加速度ベクトル
            gA.setAttribute('position', `${r} 0 0`);
            const aLength = Math.max(ac * 0.1, 0.15);
            const cylinders = gA.querySelectorAll('a-cylinder');
            cylinders[0].setAttribute('height', aLength * 0.4);
            cylinders[0].setAttribute('position', `${-aLength * 0.2} 0 0`);
            cylinders[1].setAttribute('height', aLength * 0.3);
            cylinders[1].setAttribute('position', `${-aLength * 0.7} 0 0`);
            gA.querySelector('a-cone').setAttribute('position', `${-aLength}`);
        }

        function updateVisibility() {
            gR.setAttribute('visible', showR);
            gV.setAttribute('visible', showV);
            gA.setAttribute('visible', showA);
            trailContainer.setAttribute('visible', showTrace);
        }

        chkR.addEventListener('change', (e) => { showR = e.target.checked; updateVisibility(); });
        chkV.addEventListener('change', (e) => { showV = e.target.checked; updateVisibility(); });
        chkA.addEventListener('change', (e) => { showA = e.target.checked; updateVisibility(); });
        chkTrace.addEventListener('change', (e) => { showTrace = e.target.checked; updateVisibility(); if(!showTrace) trailContainer.innerHTML=''; });

        sldR.addEventListener('input', (e) => { r = parseFloat(e.target.value); updatePhysics(); });
        sldOmega.addEventListener('input', (e) => { omega = parseFloat(e.target.value); updatePhysics(); });
        
        btnToggle.addEventListener('click', () => {
            isPlaying = !isPlaying;
            btnToggle.textContent = isPlaying ? "一時停止" : "再 生";
        });
        
        btnClear.addEventListener('click', () => {
            theta = 0;
            xHistory.length = 0;
            trailContainer.innerHTML = '';
            rotator.setAttribute('rotation', '0 0 0');
            updatePhysics();
        });

        // --- 光る軌跡(トレイル)の動的プロット ---
        let lastTrailTime = 0;
        function createTrailPoint(x, z) {
            if (!showTrace) return;
            const p = document.createElement('a-sphere');
            p.setAttribute('position', `${x} 0 ${z}`);
            p.setAttribute('radius', '0.02');
            p.setAttribute('color', '#a5b4fc');
            p.setAttribute('opacity', '0.8');
            trailContainer.appendChild(p);

            setTimeout(() => {
                if (p.parentNode) p.parentNode.removeChild(p);
            }, 2500); 
        }

        // --- リアルタイム波形グラフ ---
        function drawGraph() {
            if (bottomUi.classList.contains('collapsed')) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#cccccc';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();

            if (xHistory.length === 0) return;

            ctx.strokeStyle = '#007bff';
            ctx.lineWidth = 2.5;
            ctx.beginPath();

            const step = canvas.width / maxHistoryLen;
            for (let i = 0; i < xHistory.length; i++) {
                const val = xHistory[i];
                const canvasY = (canvas.height / 2) - (val * (canvas.height / 4.5)); 
                const canvasX = canvas.width - (i * step);

                if (i === 0) ctx.moveTo(canvasX, canvasY);
                else ctx.lineTo(canvasX, canvasY);
            }
            ctx.stroke();
        }

        // --- メインループ ---
        let lastTime = 0;
        function animate(time) {
            requestAnimationFrame(animate);

            if (!lastTime) lastTime = time;
            const dt = (time - lastTime) / 1000;
            lastTime = time;

            updateCameraTracking();

            if (isPlaying) {
                theta += omega * dt;
                const degree = (theta * 180 / Math.PI) % 360;
                rotator.setAttribute('rotation', `0 ${degree} 0`);

                const currentX = r * Math.cos(theta);
                const currentZ = -r * Math.sin(theta);

                if (time - lastTrailTime > 45) {
                    createTrailPoint(currentX, currentZ);
                    lastTrailTime = time;
                }

                xHistory.unshift(currentX);
                if (xHistory.length > maxHistoryLen) xHistory.pop();
            }

            drawGraph();
        }

        updatePhysics();
        updateVisibility();
        requestAnimationFrame(animate);
    </script>
</body>
</html>
