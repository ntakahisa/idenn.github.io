<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>等速円運動 空間固定AR教材（カメラ修正版）</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            user-select: none;
        }

        /* 状態案内UI */
        #status-alert {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(220, 53, 69, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            z-index: 15;
            pointer-events: none;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.5s ease;
        }
        .status-locked {
            background: rgba(40, 167, 69, 0.95) !important;
        }

        /* 数値表示パネル */
        #data-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
            line-height: 1.6;
            font-family: monospace;
        }
        .text-orange { color: #ff9f43; }
        .text-cyan { color: #00d2d3; }
        .text-red { color: #ff6b6b; }

        /* 操作パネル */
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 10;
            box-sizing: border-box;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background-color: #007bff;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }
        button:active {
            background-color: #0056b3;
        }
        .slider-group {
            margin-bottom: 8px;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #333;
        }
        input[type="range"] {
            width: 100%;
            height: 6px;
        }
    </style>
</head>
<body>

    <div id="status-alert">【位置決め中】机に向けて画面をタップして固定</div>

    <div id="data-panel">
        <div>半径 r : <span id="val-r" class="text-orange">1.00</span> m</div>
        <div>角速度 ω : <span id="val-omega" class="text-orange">1.50</span> rad/s</div>
        <div>速度 v : <span id="val-v" class="text-cyan">1.50</span> m/s</div>
        <div>向心加速度 a_c : <span id="val-ac" class="text-red">2.25</span> m/s²</div>
        <div>周期 T : <span id="val-t">4.19</span> s</div>
    </div>

    <div id="ui-container">
        <div class="btn-group">
            <button id="btn-play-pause">一時停止</button>
            <button id="btn-reset">最初から</button>
        </div>
        <div class="slider-group">
            <div class="slider-label">
                <span>半径 r (m)</span>
                <span id="label-r">1.00</span>
            </div>
            <input type="range" id="slider-r" min="0.2" max="2.0" step="0.1" value="1.0">
        </div>
        <div class="slider-group">
            <div class="slider-label">
                <span>角速度 ω (rad/s)</span>
                <span id="label-omega">1.50</span>
            </div>
            <input type="range" id="slider-omega" min="0.5" max="4.0" step="0.1" value="1.5">
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        
        <a-entity id="ar-world" position="0 -0.5 -2">
            
            <a-grid attributes-to-copy="grid" static-body material="opacity: 0.15; gridColor: #ffffff"></a-grid>

            <a-ring id="orbit" color="#ffffff" rotation="-90 0 0" radius-inner="0.98" radius-outer="1.02" opacity="0.7"></a-ring>

            <a-entity id="rotator" rotation="0 0 0">
                
                <a-sphere id="ball" position="1 0 0" radius="0.08" color="#ffffff"></a-sphere>

                <a-entity id="container-r">
                    <a-cylinder id="vec-r" color="#ff9f43" radius="0.015" rotation="0 0 90"></a-cylinder>
                </a-entity>

                <a-entity id="container-v">
                    <a-cylinder id="vec-v" color="#00d2d3" radius="0.015" rotation="90 0 0"></a-cylinder>
                </a-entity>

                <a-entity id="container-a">
                    <a-cylinder id="vec-a" color="#ff6b6b" radius="0.015" rotation="0 0 90"></a-cylinder>
                </a-entity>
                
            </a-entity>
        </a-entity>
        
        <a-entity id="main-camera" camera position="0 1.6 0" look-controls="pointerLockEnabled: false"></a-entity>
    </a-scene>

    <script>
        let isLocked = false;
        const sceneEl = document.querySelector('a-scene');

        // --- 画面タップ時の空間固定 ＆ センサー許可処理 ---
        window.addEventListener('click', (e) => {
            if (e.target.closest('#ui-container') || e.target.closest('#data-panel')) return;

            // iOS向けのジャイロセンサー利用許可要求
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().catch(err => console.error(err));
            }

            const cameraEl = document.getElementById('main-camera');
            const arWorld = document.getElementById('ar-world');
            const statusAlert = document.getElementById('status-alert');

            if (!isLocked) {
                // 【ロック処理】現在の視線正面の位置にモデルを配置し、固定する
                const cameraObj = cameraEl.object3D;
                const direction = new THREE.Vector3();
                cameraObj.getWorldDirection(direction);

                const newPos = new THREE.Vector3();
                newPos.copy(cameraObj.position).addScaledVector(direction, -1.8); // 1.8m先に配置
                newPos.y = cameraObj.position.y - 0.6; // 机の上に合わせるため少し下げる

                arWorld.setAttribute('position', `${newPos.x} ${newPos.y} ${newPos.z}`);
                
                isLocked = true;
                statusAlert.textContent = "📌 位置を固定しました（スマホを動かして観察可能）";
                statusAlert.classList.add('status-locked');
            } else {
                // ロックを解除して再配置モードに戻す
                isLocked = false;
                statusAlert.textContent = "【位置決め中】机に向けて画面をタップして固定";
                statusAlert.classList.remove('status-locked');
            }
        });

        // --- 固定されていない時だけカメラの前に追従させるループ ---
        setInterval(() => {
            const cameraEl = document.getElementById('main-camera');
            const arWorld = document.getElementById('ar-world');

            if (!isLocked && cameraEl && arWorld) {
                const cameraObj = cameraEl.object3D;
                const direction = new THREE.Vector3();
                cameraObj.getWorldDirection(direction);

                const targetPos = new THREE.Vector3();
                targetPos.copy(cameraObj.position).addScaledVector(direction, -1.8);
                targetPos.y = cameraObj.position.y - 0.6;

                arWorld.setAttribute('position', `${targetPos.x} ${targetPos.y} ${targetPos.z}`);
            }
        }, 1000 / 30);

        // --- 物理パラメータ ＆ アニメーションロジック ---
        let r = 1.0;
        let omega = 1.5;
        let theta = 0;
        let isPlaying = true;

        const sliderR = document.getElementById('slider-r');
        const sliderOmega = document.getElementById('slider-omega');
        const labelR = document.getElementById('label-r');
        const labelOmega = document.getElementById('label-omega');
        const valR = document.getElementById('val-r');
        const valOmega = document.getElementById('val-omega');
        const valV = document.getElementById('val-v');
        const valAc = document.getElementById('val-ac');
        const valT = document.getElementById('val-t');
        const btnPlayPause = document.getElementById('btn-play-pause');
        const btnReset = document.getElementById('btn-reset');

        const orbit = document.getElementById('orbit');
        const rotator = document.getElementById('rotator');
        const ball = document.getElementById('ball');
        const vecR = document.getElementById('vec-r');
        const vecV = document.getElementById('vec-v');
        const vecA = document.getElementById('vec-a');
        const containerR = document.getElementById('container-r');
        const containerV = document.getElementById('container-v');
        const containerA = document.getElementById('container-a');

        const scaleFactor = 0.35;

        function updatePhysics() {
            const v = r * omega;
            const ac = r * omega * omega;
            const T = (2 * Math.PI) / omega;

            valR.textContent = r.toFixed(2);
            valOmega.textContent = omega.toFixed(2);
            valV.textContent = v.toFixed(2);
            valAc.textContent = ac.toFixed(2);
            valT.textContent = T.toFixed(2);

            labelR.textContent = r.toFixed(2);
            labelOmega.textContent = omega.toFixed(2);

            orbit.setAttribute('radius-inner', (r - 0.02).toFixed(3));
            orbit.setAttribute('orbit', 'radius-outer', (r + 0.02).toFixed(3));
            ball.setAttribute('position', `${r} 0 0`);

            vecR.setAttribute('height', r);
            containerR.setAttribute('position', `${r / 2} 0 0`);

            const vLen = Math.max(v * scaleFactor, 0.05);
            vecV.setAttribute('height', vLen);
            containerV.setAttribute('position', `${r} 0 ${-vLen / 2}`);

            const aLen = Math.max(ac * scaleFactor, 0.05);
            vecA.setAttribute('height', aLen);
            containerA.setAttribute('position', `${r - (aLen / 2)} 0 0`);
        }

        sliderR.addEventListener('input', (e) => { r = parseFloat(e.target.value); updatePhysics(); });
        sliderOmega.addEventListener('input', (e) => { omega = parseFloat(e.target.value); updatePhysics(); });
        btnPlayPause.addEventListener('click', () => { isPlaying = !isPlaying; btnPlayPause.textContent = isPlaying ? "一時停止" : "再生"; });
        btnReset.addEventListener('click', () => { theta = 0; rotator.setAttribute('rotation', '0 0 0'); if (!isPlaying) { isPlaying = true; btnPlayPause.textContent = "一時停止"; } });

        let lastTime = 0;
        function animate(time) {
            requestAnimationFrame(animate);
            if (!lastTime) lastTime = time;
            const dt = (time - lastTime) / 1000;
            lastTime = time;

            if (isPlaying) {
                theta += omega * dt;
                const degree = (theta * 180 / Math.PI) % 360;
                rotator.setAttribute('rotation', `0 ${degree} 0`);
            }
        }

        updatePhysics();
        requestAnimationFrame(animate);
    </script>
</body>
</html>
