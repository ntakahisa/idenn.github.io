<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D等速円運動AR教材</title>
    <script type="text/javascript" src="https://www.geogebra.org/apps/deployggb.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f0f0;
        }
        #ggb-element {
            width: 100%;
            height: 100%;
        }
        /* AR起動を促す案内UI（必要に応じて調整してください） */
        #ar-instruction {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="ggb-element"></div>
    
    <div id="ar-instruction">
        右下の「ARボタン（三角とカメラのアイコン）」を押すと、AR空間にモデルが飛び出します！
    </div>

    <script>
        // GeoGebraパラメータの設定
        var parameters = {
            // ★ 作成していただいた専用マテリアルIDをここに完全適用しています
            "materialId": "a5jcsdyw", 
            
            "width": window.innerWidth,
            "height": window.innerHeight,
            "showMenuBar": false,          // メニューバーを非表示（生徒の誤操作を防ぐ）
            "showAlgebraInput": false,     // 数式入力バーを非表示
            "showToolBar": false,          // ツールバーを非表示
            "customToolBar": "0",
            "showResetIcon": true,         // 右上にリセットボタンを表示
            "enableLabelDrags": false,
            "enableShiftDragZoom": true,   // 3D空間の回転・ズームを許可
            "enableRightClick": false,
            "errorDialogsActive": false,
            "useBrowserForJS": true,
            "allowStyleBar": false,
            "preventFocus": false,
            "showZoomButtons": false,
            
            // 3DおよびARを有効化する設定
            "is3D": true,
            "enable3D": true,
            "enableAR": true               // モバイル端末でのAR起動ボタンを表示
        };

        // 描画を実行する設定
        var applet = new GGBApplet(parameters, '5.0', 'ggb-element');
        
        // ページ読み込み時に描画を開始
        window.onload = function() {
            applet.inject('ggb-element');
        };

        // 画面サイズが変更されたら、GeoGebraのサイズも自動調整
        window.addEventListener('resize', function() {
            if (typeof ggbApplet !== "undefined") {
                ggbApplet.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
