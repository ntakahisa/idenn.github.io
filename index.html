<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>等速円運動と単振動 マーカーレスWebAR教材</title>
    
    <!-- Three.js の読み込み -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #000;
        }

        #container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* 3D仮想空間の描画エリア */
        #canvas3d {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
        }

        /* ガイド・解説表示 */
        #guide-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            background: rgba(30, 41, 59, 0.85);
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.4;
            pointer-events: none;
            border-left: 4px solid #3b82f6;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 10;
            color: #f1f5f9;
        }

        /* AR開始ボタン */
        #ar-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* 右側：物理数値データ */
        #data-panel {
            position: absolute;
            top: 120px;
            right: 15px;
            background: rgba(15, 23, 42, 0.85);
            padding: 10px;
            border-radius: 8px;
            font-size: 11px;
            font-family: monospace;
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none;
            z-index: 10;
            color: #f1f5f9;
            display: none; /* AR開始まで非表示 */
        }
        .text-orange { color: #f97316; font-weight: bold; }
        .text-cyan { color: #06b6d4; font-weight: bold; }
        .text-red { color: #ef4444; font-weight: bold; }

        /* 左側：ベクトルON/OFFスイッチ */
        #vector-controls {
            position: absolute;
            top: 120px;
            left: 15px;
            background: rgba(15, 23, 42, 0.85);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 10;
            color: #f1f5f9;
            display: none; /* AR開始まで非表示 */
        }
        .ctrl-label {
            display: flex;
            align-items: center;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }
        .ctrl-label input {
            margin-right: 6px;
        }

        /* 下部エリア固定コンテナ */
        #ui-bottom-area {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 10;
            display: none; /* AR開始まで非表示 */
            flex-direction: column;
        }

        /* リアルタイムグラフエリア */
        #graph-container {
            border-top: 1px solid #334155;
            height: 70px;
            background: rgba(15, 23, 42, 0.85);
        }
        #graphCanvas {
            width: 100%;
            height: 100%;
        }

        /* 操作パネル */
        #control-panel {
            background: #1e293b;
            border-top: 1px solid #334155;
            padding: 15px;
            box-sizing: border-box;
        }

        .panel-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 600px;
            margin: 0 auto;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            color: #f1f5f9;
        }

        .slider-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: bold;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: #475569;
            border-radius: 3px;
            outline: none;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: white;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .action-btn:active {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

    <div id="container">
        <button id="ar-button">ARモードを開始する</button>

        <div id="guide-overlay" style="display: none;">
            📱 <b>マーカーレスARモード起動中:</b><br>
            スマホをゆっくり左右に動かして床や机をカメラに認識させてください。<br>
            <span style="color:#60a5fa; font-weight: bold;">【青いマーク】が出たら画面をタップしてモデルを配置します。</span>
        </div>

        <div id="vector-controls">
            <label class="ctrl-label"><input type="checkbox" id="chk-r" checked> 半径r (橙)</label>
            <label class="ctrl-label"><input type="checkbox" id="chk-v" checked> 速度v (青)</label>
            <label class="ctrl-label"><input type="checkbox" id="chk-a" checked> 加速度a (赤)</label>
        </div>

        <div id="data-panel">
            <div>半径 r: <span id="val-r" class="text-orange">1.20</span> m</div>
            <div>角速度 ω: <span id="val-omega" class="text-orange">2.00</span> rad/s</div>
            <div>速度 v: <span id="val-v" class="text-cyan">2.40</span> m/s</div>
            <div>加速度 a: <span id="val-ac" class="text-red">4.80</span> m/s²</div>
            <div>周期 T: <span id="val-t">3.14</span> s</div>
        </div>

        <canvas id="canvas3d"></canvas>

        <div id="ui-bottom-area">
            <div id="graph-container">
                <canvas id="graphCanvas"></canvas>
            </div>

            <div id="control-panel">
                <div class="panel-row">
                    <div class="slider-group">
                        <div class="slider-meta"><span>半径 r (m)</span><span id="lbl-r" class="text-orange">1.20</span></div>
                        <input type="range" id="sld-r" min="0.5" max="2.0" step="0.05" value="1.20">
                    </div>
                    <div class="slider-group">
                        <div class="slider-meta"><span>角速度 ω (rad/s)</span><span id="lbl-omega" class="text-orange">2.00</span></div>
                        <input type="range" id="sld-omega" min="0.5" max="4.0" step="0.05" value="2.00">
                    </div>
                    <div class="btn-group">
                        <button id="btn-play" class="action-btn">一時停止</button>
                        <button id="btn-reset" class="action-btn" style="background:#475569;">位置リセット</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. 物理パラメータの設定 ---
        let r = 1.20;
        let omega = 2.00;
        let theta = 0;
        let isPlaying = true;
        
        let showR = true, showV = true, showA = true;
        const xHistory = [];
        const maxHistoryLen = 200;

        // --- 2. Three.js / WebXR 環境の構築 ---
        const canvas3D = document.getElementById('canvas3d');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas3D, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.xr.enabled = true; // WebXRを有効化

        // 照明
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(2, 4, 3);
        scene.add(dirLight);

        // --- 3. 設置用の「照準（レティクル）」を作成 ---
        // 床や机を検知している間、床の上に表示される青いリング状の照準です。
        const reticleGeo = new THREE.RingGeometry(0.12, 0.15, 32).rotateX(-Math.PI / 2);
        const reticleMat = new THREE.MeshBasicMaterial({ color: 0x3b82f6, side: THREE.DoubleSide });
        const reticle = new THREE.Mesh(reticleGeo, reticleMat);
        reticle.matrixAutoUpdate = false;
        reticle.visible = false;
        scene.add(reticle);

        // --- 4. AR世界に配置する親グループ（モデル全体） ---
        const arModelGroup = new THREE.Group();
        arModelGroup.visible = false; // 設置するまで隠しておく
        scene.add(arModelGroup);

        // 3Dモデル要素の作成（arModelGroup の中に設置。AR表示用にスケールを少しコンパクトに調整）
        const modelScale = 0.5; // 現実サイズに収まりやすくするため半分のサイズに
        arModelGroup.scale.set(modelScale, modelScale, modelScale);

        // グリッド
        const gridHelper = new THREE.GridHelper(4, 8, 0x475569, 0x334155);
        gridHelper.position.y = -0.01;
        arModelGroup.add(gridHelper);

        // 中心軸
        const centerPinGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.4, 8);
        const centerPinMat = new THREE.MeshStandardMaterial({ color: 0x64748b });
        const centerPin = new THREE.Mesh(centerPinGeo, centerPinMat);
        centerPin.position.y = 0.2;
        arModelGroup.add(centerPin);

        // 円運動の回転軌道（リング）
        let orbitGeo = new THREE.RingGeometry(r - 0.015, r + 0.015, 64);
        const orbitMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, opacity: 0.6, transparent: true });
        let orbit = new THREE.Mesh(orbitGeo, orbitMat);
        orbit.rotation.x = Math.PI / 2; 
        orbit.position.y = 0.01;
        arModelGroup.add(orbit);

        // 円運動する主球（赤色）
        const ballGeo = new THREE.SphereGeometry(0.08, 32, 32);
        const ballMat = new THREE.MeshStandardMaterial({ color: 0xef4444, roughness: 0.2 });
        const ball = new THREE.Mesh(ballGeo, ballMat);
        ball.position.y = 0.08;
        arModelGroup.add(ball);

        // 単振動する射影球（青色）
        const shadowBallGeo = new THREE.SphereGeometry(0.06, 32, 32);
        const shadowBallMat = new THREE.MeshStandardMaterial({ color: 0x3b82f6 });
        const shadowBall = new THREE.Mesh(shadowBallGeo, shadowBallMat);
        shadowBall.position.y = 0.06; 
        arModelGroup.add(shadowBall);

        // 往復運動（単振動）のガイドレール
        const railGeo = new THREE.CylinderGeometry(0.008, 0.008, 4, 8);
        const railMat = new THREE.MeshStandardMaterial({ color: 0x475569 });
        const rail = new THREE.Mesh(railGeo, railMat);
        rail.rotation.z = Math.PI / 2;
        rail.position.set(0, 0.01, 0);
        arModelGroup.add(rail);

        // --- 5. ベクトル矢印の定義 ---
        
        // 半径ベクトル (橙)
        const arrowRGeo = new THREE.CylinderGeometry(0.008, 0.008, 1.0, 8);
        const arrowRMat = new THREE.MeshBasicMaterial({ color: 0xf97316 });
        const arrowR = new THREE.Mesh(arrowRGeo, arrowRMat);
        arrowR.rotation.z = Math.PI / 2;
        arrowR.position.y = 0.08;
        arModelGroup.add(arrowR);

        // 速度ベクトル (青緑・コーン)
        const arrowVGroup = new THREE.Group();
        const arrowVLine = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, 0.4, 8), new THREE.MeshBasicMaterial({ color: 0x06b6d4 }));
        const arrowVCone = new THREE.Mesh(new THREE.ConeGeometry(0.03, 0.1, 16), new THREE.MeshBasicMaterial({ color: 0x06b6d4 }));
        arrowVLine.position.y = 0.2;
        arrowVCone.position.y = 0.4;
        arrowVGroup.add(arrowVLine);
        arrowVGroup.add(arrowVCone);
        arrowVGroup.position.y = 0.08;
        arModelGroup.add(arrowVGroup);

        // 加速度ベクトル (赤・コーン)
        const arrowAGroup = new THREE.Group();
        const arrowALine = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, 0.4, 8), new THREE.MeshBasicMaterial({ color: 0xec4899 }));
        const arrowACone = new THREE.Mesh(new THREE.ConeGeometry(0.03, 0.1, 16), new THREE.MeshBasicMaterial({ color: 0xec4899 }));
        arrowALine.position.y = -0.2;
        arrowACone.position.y = -0.4;
        arrowAGroup.add(arrowALine);
        arrowAGroup.add(arrowACone);
        arrowAGroup.position.y = 0.08;
        arModelGroup.add(arrowAGroup);

        // --- 6. ARセッション管理とタップ（ヒットテスト）処理 ---
        let xrHitTestSource = null;
        let localSpace = null;

        const arButton = document.getElementById('ar-button');
        arButton.addEventListener('click', () => {
            // WebXRのARセッションをリクエスト
            navigator.xr.requestSession('immersive-ar', {
                requiredFeatures: ['local-floor', 'hit-test']
            }).then((session) => {
                renderer.xr.setReferenceSpaceType('local-floor');
                renderer.xr.setSession(session);

                // UIの切り替え
                arButton.style.display = 'none';
                document.getElementById('guide-overlay').style.display = 'block';
                document.getElementById('vector-controls').style.display = 'flex';
                document.getElementById('data-panel').style.display = 'block';
                document.getElementById('ui-bottom-area').style.display = 'flex';
                resizeGraphCanvas();

                // 参照空間の取得とヒットテストの設定
                session.requestReferenceSpace('viewer').then((viewerSpace) => {
                    session.requestHitTestSource({ space: viewerSpace }).then((source) => {
                        xrHitTestSource = source;
                    });
                });

                session.requestReferenceSpace('local-floor').then((space) => {
                    localSpace = space;
                });

                // 画面タップ時に、レティクル（青いリング）がある位置にモデルを設置
                session.addEventListener('select', () => {
                    if (reticle.visible) {
                        arModelGroup.position.setFromMatrixPosition(reticle.matrix);
                        arModelGroup.visible = true;
                        document.getElementById('guide-overlay').style.innerHTML = "✨ モデルを配置しました！自由に角度を変えて観察してください。";
                        setTimeout(() => {
                            document.getElementById('guide-overlay').style.display = 'none';
                        }, 3000);
                    }
                });
            });
        });


        // --- 7. リアルタイム・グラフの描画 ---
        const graphCanvas = document.getElementById('graphCanvas');
        const gCtx = graphCanvas.getContext('2d');
        
        function resizeGraphCanvas() {
            graphCanvas.width = graphCanvas.parentElement.clientWidth;
            graphCanvas.height = graphCanvas.parentElement.clientHeight;
        }

        function drawGraph() {
            gCtx.clearRect(0, 0, graphCanvas.width, graphCanvas.height);

            // 中心線
            gCtx.strokeStyle = '#334155';
            gCtx.lineWidth = 1;
            gCtx.beginPath();
            gCtx.moveTo(0, graphCanvas.height / 2);
            gCtx.lineTo(graphCanvas.width, graphCanvas.height / 2);
            gCtx.stroke();

            // 正弦波プロット
            if (xHistory.length === 0) return;
            gCtx.strokeStyle = '#3b82f6';
            gCtx.lineWidth = 2.5;
            gCtx.beginPath();
            
            const step = graphCanvas.width / maxHistoryLen;
            for (let i = 0; i < xHistory.length; i++) {
                const val = xHistory[i];
                const canvasY = (graphCanvas.height / 2) - (val * (graphCanvas.height / 5));
                const canvasX = graphCanvas.width - (i * step);
                
                if (i === 0) gCtx.moveTo(canvasX, canvasY);
                else gCtx.lineTo(canvasX, canvasY);
            }
            gCtx.stroke();
        }


        // --- 8. 物理計算の同期・更新ロジック ---
        function updatePhysicsValues() {
            const vVal = r * omega;
            const acVal = r * omega * omega;
            const tVal = (2 * Math.PI) / omega;

            document.getElementById('val-r').textContent = r.toFixed(2);
            document.getElementById('val-omega').textContent = omega.toFixed(2);
            document.getElementById('val-v').textContent = vVal.toFixed(2);
            document.getElementById('val-ac').textContent = acVal.toFixed(2);
            document.getElementById('val-t').textContent = tVal.toFixed(2);

            document.getElementById('lbl-r').textContent = r.toFixed(2);
            document.getElementById('lbl-omega').textContent = omega.toFixed(2);

            // 軌道リングの再生成
            arModelGroup.remove(orbit);
            orbitGeo = new THREE.RingGeometry(r - 0.015, r + 0.015, 64);
            orbit = new THREE.Mesh(orbitGeo, orbitMat);
            orbit.rotation.x = Math.PI / 2;
            orbit.position.y = 0.01;
            arModelGroup.add(orbit);
        }

        // --- 9. メインレンダリングループ ---
        let clock = new THREE.Clock();

        renderer.setAnimationLoop((timestamp, frame) => {
            if (frame) {
                // ヒットテスト（床認識）の更新処理
                if (xrHitTestSource && localSpace) {
                    const hitTestResults = frame.getHitTestResults(xrHitTestSource);
                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        const pose = hit.getPose(localSpace);

                        reticle.visible = true;
                        reticle.matrix.fromArray(pose.transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }

                // 物理演算アニメーションの実行
                const dt = clock.getDelta();
                if (isPlaying) {
                    theta += omega * dt;

                    const ballX = r * Math.cos(theta);
                    const ballZ = -r * Math.sin(theta);
                    ball.position.set(ballX, 0.08, ballZ);

                    shadowBall.position.x = ballX;

                    arrowR.position.set(ballX / 2, 0.08, ballZ / 2);
                    arrowR.scale.set(1, r, 1);
                    arrowR.rotation.z = Math.atan2(ballZ, ballX) + Math.PI / 2;

                    arrowVGroup.position.set(ballX, 0.08, ballZ);
                    arrowVGroup.rotation.y = theta;
                    const vMag = r * omega * 0.35;
                    arrowVGroup.scale.set(1, vMag, 1);

                    arrowAGroup.position.set(ballX, 0.08, ballZ);
                    arrowAGroup.rotation.y = theta;
                    const aMag = r * omega * omega * 0.15;
                    arrowAGroup.scale.set(1, aMag, 1);

                    arrowR.visible = showR;
                    arrowVGroup.visible = showV;
                    arrowAGroup.visible = showA;

                    xHistory.unshift(ballX);
                    if (xHistory.length > maxHistoryLen) xHistory.pop();
                }
            }

            drawGraph();
            renderer.render(scene, camera);
        });


        // --- 10. UIイベントの紐付け ---
        const sldR = document.getElementById('sld-r');
        const sldOmega = document.getElementById('sld-omega');
        const btnPlay = document.getElementById('btn-play');
        const btnReset = document.getElementById('btn-reset');

        sldR.addEventListener('input', (e) => {
            r = parseFloat(e.target.value);
            updatePhysicsValues();
        });

        sldOmega.addEventListener('input', (e) => {
            omega = parseFloat(e.target.value);
            updatePhysicsValues();
        });

        btnPlay.addEventListener('click', () => {
            isPlaying = !isPlaying;
            btnPlay.textContent = isPlaying ? "一時停止" : "再 生";
        });

        btnReset.addEventListener('click', () => {
            theta = 0;
            xHistory.length = 0;
            updatePhysicsValues();
        });

        document.getElementById('chk-r').addEventListener('change', (e) => showR = e.target.checked);
        document.getElementById('chk-v').addEventListener('change', (e) => showV = e.target.checked);
        document.getElementById('chk-a').addEventListener('change', (e) => showA = e.target.checked);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            resizeGraphCanvas();
        });

        // 初期セットアップ
        updatePhysicsValues();
    </script>
</body>
</html>
